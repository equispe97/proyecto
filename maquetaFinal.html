<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    *{
      padding: 0px;
      margin: 0px;
    }
    #encabezado{
      background: red;
      height: 350px;
    }
    
    #encabezado h1{
      height: 79px;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
    }
    
    #logotipo{
      border: 2px solid yellow;
    }
    #encabezado #logotipo img{
      width: 400px;
      display: block;
      margin: 0px auto;
      margin-top: 20px;
      margin-bottom: 20px;
    }
    
    
    #cabecera-menu{
      background-color: #333333;
      font-family: Sans-Serif;
      font-size: 15px;
      height: 60px;
    }
    .menu{
      height: 100%;
      display: flex;
      justify-content: center;
    }
    .menu > li{
      position: relative;
      list-style: none;
    }
    .menu > li:first-child {
      border-left: 1px solid gray;
    }
    .menu > li > a{
      text-decoration: none;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      width: 160px;
      border-right: 1px solid gray;
    }
    .menu > li:hover{
      background-color: green;
      box-shadow: 0px 0px 5px black inset;
    }
    .submenu{
      display: none;
      position: absolute;
    }
    .submenu >li{
      list-style: none;
      background-color: blue;
    }
    .submenu >li > a{
      text-decoration: none;
      color: black;
    }
    .menu > li:hover > .submenu{
      display: block;
    }
    .menu > li:hover > .submenu > li{
      width: 140px;
    }
    </style>
</head>
<body>
  <header id="encabezado">
    <div id="logotipo">
      <img src="https://a.storyblok.com/f/178900/1717x967/ee61c8f366/chainsaw-man-reze.png/m/1200x0/filters:quality(95)format(webp)" alt="welcome to the nhk" />
    </div>
    <h1>Titulo 1</h1>
  </header>
  
  <nav id="cabecera-menu">
    <ul class="menu">
      <li>
        <a href="#">Inicio</a>
        <ul class="submenu">
          <li><a href="#">Sitio1</a></li>
          <li><a href="#">Sitio2</a></li>
          <li><a href="#">Sitio3</a></li>
        </ul>
      </li>
      <li>
        <a href="#">Contenido</a>
        <ul class="submenu">
          <li><a href="#">Sitio1</a></li>
          <li><a href="#">Sitio2</a></li>
          <li><a href="#">Sitio3</a></li>
          <li><a href="#">Sitio4</a></li>
          <li><a href="#">Sitio5</a></li>
        </ul>
      </li>
      <li><a href="#">Requerimiento</a></li>
      <li><a href="#">Lenguajes</a></li>
      <li><a href="#">Frameworks</a></li>
      <li><a href="#">Proyectos</a></li>
    </ul>
    
  </nav>
</body>
</html>
